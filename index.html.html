<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio BMV · Isaac</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a35;
    --border2: #1f1f28;
    --accent: #c8f060;
    --accent2: #60f0c8;
    --red: #ff5252;
    --green: #52ff8e;
    --text: #e8e8f0;
    --muted: #666680;
    --muted2: #444458;
    --font-mono: 'DM Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* Header */
  header {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border2);
    margin-bottom: 32px;
  }

  .header-inner {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo-area h1 {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo-area h1 span { color: var(--accent); }

  .logo-area p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .last-updated {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 8px 16px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .refresh-btn:hover { background: var(--border); border-color: var(--accent); }
  .refresh-btn svg { width: 14px; height: 14px; }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.3;
  }

  .summary-card.positive::before { background: var(--green); opacity: 0.5; }
  .summary-card.negative::before { background: var(--red); opacity: 0.5; }

  .summary-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .summary-value {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .summary-value.positive { color: var(--green); }
  .summary-value.negative { color: var(--red); }

  .summary-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* IPC comparison bar */
  .ipc-bar {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .ipc-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }

  .ipc-track {
    flex: 1;
    min-width: 200px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    position: relative;
    overflow: visible;
  }

  .ipc-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.8s ease;
    position: relative;
  }

  .ipc-marker {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    z-index: 2;
  }

  .ipc-stats { display: flex; gap: 24px; }
  .ipc-stat { text-align: center; }
  .ipc-stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .ipc-stat-val { font-size: 13px; font-weight: 500; margin-top: 2px; }

  /* Section header */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .add-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .add-btn:hover { background: var(--surface2); }

  /* Stock cards */
  .stocks-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }

  .stock-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stock-card:hover { border-color: var(--border); }

  .stock-card.expanded { border-color: var(--border); }

  .stock-main {
    display: grid;
    grid-template-columns: 180px 1fr 1fr 1fr 1fr auto;
    align-items: center;
    padding: 16px 20px;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  @media (max-width: 768px) {
    .stock-main {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
    }
    .stock-col-actions { display: none; }
  }

  .stock-name-area { display: flex; flex-direction: column; gap: 2px; }

  .stock-ticker {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .stock-fullname {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .stock-col { display: flex; flex-direction: column; gap: 2px; }

  .stock-col-label {
    font-size: 10px;
    color: var(--muted2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .stock-col-val {
    font-size: 13px;
    font-weight: 500;
  }

  .stock-col-val.positive { color: var(--green); }
  .stock-col-val.negative { color: var(--red); }
  .stock-col-val.neutral { color: var(--muted); }

  .expand-icon {
    color: var(--muted2);
    font-size: 16px;
    transition: transform 0.3s;
  }

  .stock-card.expanded .expand-icon { transform: rotate(180deg); }

  /* Stock detail */
  .stock-detail {
    display: none;
    border-top: 1px solid var(--border2);
    padding: 20px;
    gap: 20px;
  }

  .stock-card.expanded .stock-detail { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

  @media (max-width: 768px) {
    .stock-card.expanded .stock-detail { grid-template-columns: 1fr; }
  }

  .detail-section { display: flex; flex-direction: column; gap: 10px; }

  .detail-title {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .detail-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border2);
  }

  .ratio-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }

  .ratio-key { color: var(--muted); }
  .ratio-val { color: var(--text); font-weight: 500; }

  .earnings-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
  }

  .earnings-date {
    font-size: 16px;
    font-weight: 600;
    font-family: var(--font-display);
    color: var(--accent);
  }

  .earnings-countdown {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  .earnings-quarter {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .news-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border2);
    font-size: 12px;
    line-height: 1.5;
  }

  .news-item:last-child { border-bottom: none; padding-bottom: 0; }

  .news-date { font-size: 10px; color: var(--muted2); margin-bottom: 3px; letter-spacing: 0.05em; }

  .news-headline { color: var(--text); }

  .news-source { font-size: 10px; color: var(--muted2); margin-top: 2px; }

  /* Edit bar inside card */
  .edit-bar {
    display: none;
    background: var(--surface2);
    border-top: 1px solid var(--border2);
    padding: 16px 20px;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .stock-card.editing .edit-bar { display: flex; }

  .edit-field { display: flex; flex-direction: column; gap: 5px; }

  .edit-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

  .edit-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 13px;
    width: 140px;
    outline: none;
    transition: border-color 0.2s;
  }

  .edit-input:focus { border-color: var(--accent); }

  .edit-save {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    align-self: flex-end;
    transition: opacity 0.2s;
  }

  .edit-save:hover { opacity: 0.85; }

  .edit-delete {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 8px 14px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
    align-self: flex-end;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .edit-delete:hover { opacity: 1; }

  /* Edit toggle btn on card */
  .edit-toggle {
    background: transparent;
    border: none;
    color: var(--muted2);
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
    font-size: 14px;
  }

  .edit-toggle:hover { color: var(--accent); }

  /* Modal for adding stock */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 400px;
    max-width: calc(100vw - 48px);
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .modal-fields { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }

  .modal-field { display: flex; flex-direction: column; gap: 6px; }

  .modal-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

  .modal-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .modal-input:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  .modal-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 9px 18px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-cancel:hover { border-color: var(--muted); color: var(--text); }

  .modal-add {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .modal-add:hover { opacity: 0.85; }

  /* Footer */
  footer {
    border-top: 1px solid var(--border2);
    padding: 20px 0;
    margin-top: 20px;
    text-align: center;
    font-size: 11px;
    color: var(--muted2);
    letter-spacing: 0.05em;
  }

  /* Animate in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .stock-card { animation: fadeUp 0.4s ease both; }

  .volume-badge {
    display: inline-block;
    background: rgba(200, 240, 96, 0.1);
    color: var(--accent);
    border: 1px solid rgba(200, 240, 96, 0.2);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 10px;
    letter-spacing: 0.05em;
  }

  .volume-badge.normal { background: rgba(102,102,128,0.1); color: var(--muted); border-color: var(--border2); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo-area">
        <h1>PORT<span>·</span>BMV</h1>
        <p>Seguimiento de portafolio · Bolsa Mexicana de Valores</p>
      </div>
      <div class="header-right">
        <span class="last-updated" id="lastUpdated">Actualizado: —</span>
        <button class="refresh-btn" onclick="refreshPrices()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          Refresh
        </button>
      </div>
    </div>
  </header>

  <!-- Summary -->
  <div class="summary-grid" id="summaryGrid"></div>

  <!-- IPC Bar -->
  <div class="ipc-bar">
    <span class="ipc-label">vs IPC</span>
    <div class="ipc-track">
      <div class="ipc-fill" id="ipcFill" style="width: 50%;"></div>
    </div>
    <div class="ipc-stats">
      <div class="ipc-stat">
        <div class="ipc-stat-label">Mi portafolio</div>
        <div class="ipc-stat-val" id="myReturnStat">—</div>
      </div>
      <div class="ipc-stat">
        <div class="ipc-stat-label">IPC (ref.)</div>
        <div class="ipc-stat-val" id="ipcReturnStat">—</div>
      </div>
      <div class="ipc-stat">
        <div class="ipc-stat-label">Alpha</div>
        <div class="ipc-stat-val" id="alphaStat">—</div>
      </div>
    </div>
  </div>

  <!-- Stocks -->
  <div class="section-header">
    <span class="section-title">Posiciones · <span id="posCount">0</span> emisoras</span>
    <button class="add-btn" onclick="openModal()">+ Agregar emisora</button>
  </div>

  <div class="stocks-list" id="stocksList"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">Agregar emisora</div>
    <div class="modal-fields">
      <div class="modal-field">
        <label class="modal-label">Ticker (BMV)</label>
        <input class="modal-input" id="mTicker" placeholder="ej. WALMEX">
      </div>
      <div class="modal-field">
        <label class="modal-label">Nombre completo</label>
        <input class="modal-input" id="mName" placeholder="ej. Wal-Mart de México">
      </div>
      <div class="modal-field">
        <label class="modal-label">Número de títulos</label>
        <input class="modal-input" id="mTitulos" type="number" placeholder="ej. 1000">
      </div>
      <div class="modal-field">
        <label class="modal-label">Costo promedio (MXN)</label>
        <input class="modal-input" id="mCosto" type="number" step="0.01" placeholder="ej. 65.50">
      </div>
      <div class="modal-field">
        <label class="modal-label">Precio actual (MXN)</label>
        <input class="modal-input" id="mPrecio" type="number" step="0.01" placeholder="ej. 72.30">
      </div>
      <div class="modal-field">
        <label class="modal-label">Próximo reporte trimestral</label>
        <input class="modal-input" id="mEarnings" type="date">
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-add" onclick="addStock()">Agregar</button>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    PORT·BMV — Actualiza los precios con el botón Refresh · Los precios son los que tú ingreses manualmente
  </div>
</footer>

// IPC reference return (manual, update when needed)
const IPC_RETURN_PCT = 4.2;

// ─── STATE ───────────────────────────────────────────────────────────────────
let stocks = JSON.parse(localStorage.getItem('portbmv_stocks') || 'null') || DEFAULT_STOCKS;

function save() {
  localStorage.setItem('portbmv_stocks', JSON.stringify(stocks));
}

// ─── CALCULATIONS ────────────────────────────────────────────────────────────
function calcPnL(s) {
  const costTotal = s.titulos * s.costo;
  const mktVal = s.titulos * s.precio;
  const pnl = mktVal - costTotal;
  const pct = ((s.precio - s.costo) / s.costo) * 100;
  return { costTotal, mktVal, pnl, pct };
}

function totalPortfolio() {
  let totalCost = 0, totalMkt = 0;
  stocks.forEach(s => {
    totalCost += s.titulos * s.costo;
    totalMkt += s.titulos * s.precio;
  });
  const pnl = totalMkt - totalCost;
  const pct = ((totalMkt - totalCost) / totalCost) * 100;
  return { totalCost, totalMkt, pnl, pct };
}

function formatMXN(n) {
  return '$' + n.toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatPct(n) {
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date();
  const target = new Date(dateStr);
  const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
  return diff;
}

function formatEarningsDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('es-MX', { day: 'numeric', month: 'long', year: 'numeric' });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderSummary() {
  const { totalCost, totalMkt, pnl, pct } = totalPortfolio();
  const alpha = pct - IPC_RETURN_PCT;

  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card">
      <div class="summary-label">Valor de mercado</div>
      <div class="summary-value">${formatMXN(totalMkt)}</div>
      <div class="summary-sub">Costo total: ${formatMXN(totalCost)}</div>
    </div>
    <div class="summary-card ${pnl >= 0 ? 'positive' : 'negative'}">
      <div class="summary-label">P&L total</div>
      <div class="summary-value ${pnl >= 0 ? 'positive' : 'negative'}">${formatMXN(pnl)}</div>
      <div class="summary-sub">${formatPct(pct)} desde compra</div>
    </div>
    <div class="summary-card ${alpha >= 0 ? 'positive' : 'negative'}">
      <div class="summary-label">Alpha vs IPC</div>
      <div class="summary-value ${alpha >= 0 ? 'positive' : 'negative'}">${formatPct(alpha)}</div>
      <div class="summary-sub">IPC ref: ${formatPct(IPC_RETURN_PCT)}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Posiciones</div>
      <div class="summary-value">${stocks.length}</div>
      <div class="summary-sub">emisoras en portafolio</div>
    </div>
  `;

  // IPC bar
  const myR = pct;
  const ipcR = IPC_RETURN_PCT;
  const maxAbs = Math.max(Math.abs(myR), Math.abs(ipcR), 5);
  const myPos = Math.min(100, Math.max(0, ((myR + maxAbs) / (2 * maxAbs)) * 100));
  const ipcPos = Math.min(100, Math.max(0, ((ipcR + maxAbs) / (2 * maxAbs)) * 100));

  document.getElementById('ipcFill').style.width = myPos + '%';
  document.getElementById('ipcFill').style.background = myR >= ipcR
    ? 'linear-gradient(90deg, var(--accent2), var(--accent))'
    : 'linear-gradient(90deg, var(--red), #ff8a80)';

  document.getElementById('myReturnStat').innerHTML = `<span style="color:${myR>=0?'var(--green)':'var(--red)'}">${formatPct(myR)}</span>`;
  document.getElementById('ipcReturnStat').innerHTML = `<span style="color:var(--muted)">${formatPct(ipcR)}</span>`;
  document.getElementById('alphaStat').innerHTML = `<span style="color:${alpha>=0?'var(--green)':'var(--red)'}">${formatPct(alpha)}</span>`;
}

function renderStocks() {
  document.getElementById('posCount').textContent = stocks.length;
  const list = document.getElementById('stocksList');
  list.innerHTML = '';

  stocks.forEach((s, idx) => {
    const { pnl, pct, mktVal, costTotal } = calcPnL(s);
    const days = daysUntil(s.earnings);
    const isPositive = pnl >= 0;
    const card = document.createElement('div');
    card.className = 'stock-card';
    card.style.animationDelay = (idx * 0.05) + 's';
    card.id = 'card-' + s.id;

    const earningsHTML = s.earnings
      ? `<div class="earnings-chip">
          <div class="earnings-date">${formatEarningsDate(s.earnings)}</div>
          <div class="earnings-countdown">${days > 0 ? `En ${days} días` : days === 0 ? '¡Hoy!' : `Hace ${Math.abs(days)} días`}</div>
          <div class="earnings-quarter">${s.trimestre}</div>
        </div>`
      : `<div class="earnings-chip">
          <div class="earnings-date" style="color:var(--muted);font-size:13px;">ETF</div>
          <div class="earnings-countdown">Sin fecha de reporte</div>
        </div>`;

    const ratiosHTML = Object.entries(s.ratios).map(([k, v]) =>
      `<div class="ratio-row"><span class="ratio-key">${k}</span><span class="ratio-val">${v}</span></div>`
    ).join('');

    const newsHTML = s.news.map(n =>
      `<div class="news-item">
        <div class="news-date">${n.date} · ${n.source}</div>
        <div class="news-headline">${n.headline}</div>
      </div>`
    ).join('');

    const volBadgeClass = s.volumen === 'alto' ? 'volume-badge' : 'volume-badge normal';
    const volText = s.volumen === 'alto' ? '▲ VOLUMEN ALTO' : 'VOL. NORMAL';

    card.innerHTML = `
      <div class="stock-main" onclick="toggleCard(${s.id})">
        <div class="stock-name-area">
          <div class="stock-ticker">${s.ticker}</div>
          <div class="stock-fullname">${s.name}</div>
        </div>
        <div class="stock-col">
          <div class="stock-col-label">Precio actual</div>
          <div class="stock-col-val">$${s.precio.toFixed(2)}</div>
        </div>
        <div class="stock-col">
          <div class="stock-col-label">Costo prom.</div>
          <div class="stock-col-val neutral">$${s.costo.toFixed(2)}</div>
        </div>
        <div class="stock-col">
          <div class="stock-col-label">Valor merc.</div>
          <div class="stock-col-val">${formatMXN(mktVal)}</div>
        </div>
        <div class="stock-col">
          <div class="stock-col-label">P&L</div>
          <div class="stock-col-val ${isPositive ? 'positive' : 'negative'}">${formatMXN(pnl)}</div>
          <div class="stock-col-label" style="color:${isPositive ? 'var(--green)' : 'var(--red)'}">${formatPct(pct)}</div>
        </div>
        <div class="stock-col-actions" style="display:flex;align-items:center;gap:10px;">
          <button class="edit-toggle" onclick="event.stopPropagation(); toggleEdit(${s.id})" title="Editar">✏</button>
          <span class="expand-icon">▾</span>
        </div>
      </div>

      <div class="stock-detail">
        <div class="detail-section">
          <div class="detail-title">Ratios clave</div>
          ${ratiosHTML}
          <div style="margin-top:8px;">
            <span class="${volBadgeClass}">${volText}</span>
            <div style="font-size:11px;color:var(--muted);margin-top:5px;">${s.volNote}</div>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-title">Próximo reporte</div>
          ${earningsHTML}
        </div>
        <div class="detail-section">
          <div class="detail-title">Noticias recientes</div>
          ${newsHTML}
        </div>
      </div>

      <div class="edit-bar" id="editbar-${s.id}">
        <div class="edit-field">
          <label class="edit-label">Precio actual</label>
          <input class="edit-input" id="ep-${s.id}" type="number" step="0.01" value="${s.precio}">
        </div>
        <div class="edit-field">
          <label class="edit-label">Títulos</label>
          <input class="edit-input" id="et-${s.id}" type="number" value="${s.titulos}">
        </div>
        <div class="edit-field">
          <label class="edit-label">Costo prom.</label>
          <input class="edit-input" id="ec-${s.id}" type="number" step="0.01" value="${s.costo}">
        </div>
        <div class="edit-field">
          <label class="edit-label">Próx. reporte</label>
          <input class="edit-input" id="ee-${s.id}" type="date" value="${s.earnings || ''}">
        </div>
        <button class="edit-save" onclick="saveEdit(${s.id})">Guardar</button>
        <button class="edit-delete" onclick="deleteStock(${s.id})">Eliminar</button>
      </div>
    `;

    list.appendChild(card);
  });
}

function render() {
  renderSummary();
  renderStocks();
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('expanded');
}

function toggleEdit(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('editing');
  if (card.classList.contains('editing')) {
    card.classList.add('expanded');
  }
}

function saveEdit(id) {
  const s = stocks.find(x => x.id === id);
  const newPrecio = parseFloat(document.getElementById('ep-' + id).value);
  const newTitulos = parseInt(document.getElementById('et-' + id).value);
  const newCosto = parseFloat(document.getElementById('ec-' + id).value);
  const newEarnings = document.getElementById('ee-' + id).value || null;

  if (!isNaN(newPrecio)) s.precio = newPrecio;
  if (!isNaN(newTitulos)) s.titulos = newTitulos;
  if (!isNaN(newCosto)) s.costo = newCosto;
  s.earnings = newEarnings;

  save();
  render();
  updateTimestamp();
}

function deleteStock(id) {
  if (!confirm('¿Eliminar esta emisora del portafolio?')) return;
  stocks = stocks.filter(x => x.id !== id);
  save();
  render();
}

function refreshPrices() {
  const btn = document.querySelector('.refresh-btn');
  btn.style.opacity = '0.5';
  btn.style.pointerEvents = 'none';
  setTimeout(() => {
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
    updateTimestamp();
    // Pulse effect
    document.querySelectorAll('.stock-card').forEach(c => {
      c.style.borderColor = 'var(--accent)';
      setTimeout(() => c.style.borderColor = '', 600);
    });
  }, 800);
  updateTimestamp();
}

function updateTimestamp() {
  const now = new Date();
  document.getElementById('lastUpdated').textContent = 'Actualizado: ' + now.toLocaleString('es-MX', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
  localStorage.setItem('portbmv_lastupdate', now.toISOString());
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('mTicker').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  ['mTicker','mName','mTitulos','mCosto','mPrecio','mEarnings'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

async function addStock() {
  const ticker = document.getElementById('mTicker').value.trim().toUpperCase();
  const name = document.getElementById('mName').value.trim();
  const titulos = parseInt(document.getElementById('mTitulos').value);
  const costo = parseFloat(document.getElementById('mCosto').value);
  const precio = parseFloat(document.getElementById('mPrecio').value);
  const earnings = document.getElementById('mEarnings').value || null;

  if (!ticker || !name || isNaN(titulos) || isNaN(costo) || isNaN(precio)) {
    alert('Por favor completa todos los campos obligatorios.');
    return;
  }

  // Show loading state
  const addBtn = document.querySelector('.modal-add');
  const origText = addBtn.textContent;
  addBtn.textContent = '⟳ Consultando IA...';
  addBtn.disabled = true;
  addBtn.style.opacity = '0.7';

  const newId = Math.max(...stocks.map(s => s.id), 0) + 1;

  // Default stock while loading
  const newStock = {
    id: newId,
    ticker, name, titulos, costo, precio,
    earnings,
    trimestre: '1T 2026',
    ratios: { 'P/E': '...', 'P/VL': '...', 'Div. yield': '...', 'ROE': '...', 'Margen neto': '...' },
    volumen: 'normal',
    volNote: 'Consultando análisis de volumen...',
    news: [{ date: '...', headline: 'Cargando noticias recientes...', source: '...' }]
  };

  stocks.push(newStock);
  save();
  closeModal();
  render();

  // Reset button
  addBtn.textContent = origText;
  addBtn.disabled = false;
  addBtn.style.opacity = '1';

  // Now fetch from Claude API
  try {
    const prompt = `Eres un analista financiero especializado en la Bolsa Mexicana de Valores (BMV).
El usuario acaba de agregar la siguiente acción a su portafolio:
- Ticker BMV: ${ticker}
- Empresa: ${name}
- Precio actual: $${precio} MXN
- Precio de compra: $${costo} MXN

Responde ÚNICAMENTE con un objeto JSON válido, sin markdown, sin backticks, sin texto adicional. El JSON debe tener exactamente esta estructura:
{
  "ratios": {
    "P/E": "valor aproximado con x al final ej: 12.3x",
    "P/VL": "valor aproximado con x",
    "Div. yield": "porcentaje ej: 3.2%",
    "ROE": "porcentaje ej: 18.5%",
    "Margen neto": "porcentaje ej: 7.1%"
  },
  "volumen": "normal o alto",
  "volNote": "una frase corta sobre el contexto de volumen reciente de esta acción en la BMV",
  "news": [
    { "date": "Mes Año", "headline": "titular de noticia relevante reciente", "source": "fuente" },
    { "date": "Mes Año", "headline": "titular de noticia relevante reciente", "source": "fuente" },
    { "date": "Mes Año", "headline": "titular de noticia relevante reciente", "source": "fuente" }
  ],
  "trimestre": "ej: 1T 2026"
}
Usa información real y actualizada que conozcas sobre esta empresa. Si no conoces un ratio exacto, usa una estimación razonable basada en el sector. Asegúrate de que el JSON sea parseable.`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const rawText = data.content?.map(b => b.text || '').join('').trim();
    const clean = rawText.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // Update the stock with real data
    const idx = stocks.findIndex(s => s.id === newId);
    if (idx !== -1) {
      stocks[idx].ratios = parsed.ratios || newStock.ratios;
      stocks[idx].volumen = parsed.volumen || 'normal';
      stocks[idx].volNote = parsed.volNote || '';
      stocks[idx].news = parsed.news || newStock.news;
      stocks[idx].trimestre = parsed.trimestre || '1T 2026';
      save();
      render();
    }
  } catch (err) {
    console.error('Error fetching from Claude API:', err);
    // Leave with defaults silently — no crash
    const idx = stocks.findIndex(s => s.id === newId);
    if (idx !== -1) {
      stocks[idx].ratios = { 'P/E': '—', 'P/VL': '—', 'Div. yield': '—', 'ROE': '—', 'Margen neto': '—' };
      stocks[idx].volNote = 'No se pudo obtener datos automáticamente. Edita manualmente.';
      stocks[idx].news = [{ date: 'Hoy', headline: 'Emisora agregada. Edita para agregar noticias.', source: 'Manual' }];
      save();
      render();
    }
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
const lastUpdate = localStorage.getItem('portbmv_lastupdate');
if (lastUpdate) {
  const d = new Date(lastUpdate);
  document.getElementById('lastUpdated').textContent = 'Actualizado: ' + d.toLocaleString('es-MX', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

render();
</script>
